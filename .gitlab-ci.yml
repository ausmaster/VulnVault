stages:
  - test
  - security

build:
  stage: test
  image: python:3.12
  script:
    - pip install -e .
    - python -c "import vulnvault; print('Build successful')"
  rules:
    - if: $CI_PIPELINE_SOURCE == "web"
    - if: $CI_MERGE_REQUEST_IID
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

semgrep:
  stage: security
  image: semgrep/semgrep
  script: semgrep ci
  rules:
    - if: $CI_PIPELINE_SOURCE == "web"
    - if: $CI_MERGE_REQUEST_IID
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  variables:
    SEMGREP_APP_TOKEN: $SEMGREP_APP_TOKEN